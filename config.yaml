project:
  name: "Customer_Segmentation"
  random_state: 42

data:
  raw_path: "data/marketing_campaign.csv"
  datetime_column: "Dt_Customer"
  id_column: "ID"
  drop_columns: ["ID"] # Các cột không dùng

preprocessing:
  output_dir: "preprocessing_output"
  missing_strategy: "auto"       # auto, median, mean, mode
  outlier_method: "auto" # auto, iqr, zscore, isolation_forest
  outlier_treatment: "cap"       # auto, remove, cap, impute
  encode_method: "auto"          # auto, onehot, label
  scale_method: "standard"       # standard, minmax, robust
  create_datetime_features: true

clustering:
  use_pca: true
  pca_variance: 0.95
  fine_tune: true                # Có chạy tìm tham số tối ưu không
  export_results: true
  report_output_dir: "clustering_results"

  algorithms:
    kmeans:
      enabled: true
      param_grid:
        n_clusters: [3, 4, 5, 6]
        init: ["k-means++"]
        n_init: [10]
        max_iter: [300]

    gmm:
      enabled: true
      param_grid:
        n_components: [3, 4, 5]
        covariance_type: ["full", "tied"]
        max_iter: [100]

visualization:
  style: "seaborn-v0_8-darkgrid"
  save_format: "png"